<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度一下，你就知道</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #2932e1, #d90000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .search-container {
            position: relative;
            margin-bottom: 30px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border: 3px solid #4e6ef2;
            border-radius: 50px;
            padding: 12px 25px;
            box-shadow: 0 5px 15px rgba(78, 110, 242, 0.2);
        }
        
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 18px;
            padding: 10px;
            background: transparent;
        }
        
        .search-buttons {
            display: flex;
            gap: 10px;
        }
        
        .search-btn {
            background: #4e6ef2;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {
            background: #3b5bdb;
            transform: translateY(-2px);
        }
        
        .voice-search {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: 15px;
            transition: all 0.3s ease;
        }
        
        .voice-search:hover {
            background: #4e6ef2;
            color: white;
            border-color: #4e6ef2;
        }
        
        .hot-search {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .hot-search h3 {
            color: #1a1a1a;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .hot-search h3::before {
            content: "🔥";
            font-size: 20px;
        }
        
        .hot-items {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .hot-item {
            background: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .hot-item:hover {
            border-color: #4e6ef2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 110, 242, 0.1);
        }
        
        .hot-item .rank {
            font-weight: bold;
            color: #ff4d4f;
            margin-right: 8px;
        }
        
        .image-search {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .image-search h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .image-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .upload-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            padding: 20px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .feature-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .feature-item:hover {
            background: #4e6ef2;
            color: white;
            transform: translateY(-2px);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                margin-top: 20px;
            }
            
            .logo h1 {
                font-size: 36px;
            }
            
            .hot-items {
                grid-template-columns: 1fr;
            }
            
            .features {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>百度</h1>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="请输入搜索内容">
                <div class="search-buttons">
                    <button class="search-btn">百度一下</button>
                    <div class="voice-search" title="语音搜索">
                        🎤
                    </div>
                </div>
            </div>
        </div>
        
        <div class="hot-search">
            <h3>百度热搜</h3>
            <div class="hot-items">
                <div class="hot-item"><span class="rank">1</span>人工智能发展</div>
                <div class="hot-item"><span class="rank">2</span>科技创新峰会</div>
                <div class="hot-item"><span class="rank">3</span>元宇宙趋势</div>
                <div class="hot-item"><span class="rank">4</span>数字经济发展</div>
                <div class="hot-item"><span class="rank">5</span>智能汽车技术</div>
                <div class="hot-item"><span class="rank">6</span>量子计算突破</div>
            </div>
        </div>
        
        <div class="image-search">
            <h3>图片搜索</h3>
            <div class="image-upload">
                <div class="upload-btn">
                    📁 点击上传图片或拖拽图片到这里
                </div>
                <button class="search-btn">搜索图片</button>
            </div>
        </div>
        
        <div class="features">
            <div class="feature-item">新闻</div>
            <div class="feature-item">视频</div>
            <div class="feature-item">知道</div>
            <div class="feature-item">贴吧</div>
            <div class="feature-item">地图</div>
            <div class="feature-item">文库</div>
        </div>
    </div>

    <script>
        // 搜索功能
        document.querySelector('.search-btn').addEventListener('click', function() {
            const query = document.querySelector('.search-input').value.trim();
            if (query) {
                alert(`正在搜索: ${query}`);
                // 实际项目中这里会跳转到搜索结果页
            }
        });
        
        // 语音搜索功能
        document.querySelector('.voice-search').addEventListener('click', function() {
            alert('语音搜索功能启动中...\n请说出您的搜索内容');
            // 实际项目中这里会调用Web Speech API
        });
        
        // 图片上传功能
        const uploadBtn = document.querySelector('.upload-btn');
        uploadBtn.addEventListener('click', function() {
            alert('图片上传功能\n请选择要搜索的图片文件');
            // 实际项目中这里会处理文件上传
        });
        
        // 热搜项点击
        document.querySelectorAll('.hot-item').forEach(item => {
            item.addEventListener('click', function() {
                const searchText = this.textContent.replace(/^\d+\s/, '');
                document.querySelector('.search-input').value = searchText;
                alert(`准备搜索热搜内容: ${searchText}`);
            });
        });
        
        // 功能项点击
        document.querySelectorAll('.feature-item').forEach(item => {
            item.addEventListener('click', function() {
                const featureName = this.textContent;
                alert(`跳转到${featureName}频道`);
            });
        });
        
        // 回车键搜索
        document.querySelector('.search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.querySelector('.search-btn').click();
            }
        });
    </script>
</body>
</html>
