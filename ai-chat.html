<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型交互演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 800px;
            margin: 20px auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
        }
        
        .user-message {
            background-color: #E3F2FD;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .ai-message {
            background-color: #F1F1F1;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        
        .input-container {
            display: flex;
            padding: 20px;
            border-top: 1px solid #E0E0E0;
        }
        
        .input-container input {
            flex: 1;
            padding: 10px;
            border: 1px solid #E0E0E0;
            border-radius: 20px;
            margin-right: 10px;
        }
        
        .input-container button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .input-container button:hover {
            background-color: #45a049;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>大模型交互演示</h1>
        </div>
        <div class="chat-container" id="chat-container">
            <div class="message ai-message">
                你好！我是一个AI助手，有什么可以帮助你的吗？
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="输入你的问题...">
            <button id="send-btn">发送</button>
        </div>
    </div>
    
    <script>
        // 模拟API响应，实际使用时需要替换为真实的API地址和实现
        const API_URL = 'https://api.example.com/chat';
        
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        // 发送消息的函数
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // 添加用户消息到聊天界面
            addMessage(message, 'user');
            userInput.value = '';
            
            // 显示加载状态
            const loadingElement = showLoading();
            
            try {
                // 模拟API延迟
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // 模拟API响应
                const mockResponse = getMockResponse(message);
                
                // 隐藏加载状态
                hideLoading(loadingElement);
                
                // 添加AI响应到聊天界面
                addMessage(mockResponse, 'ai');
            } catch (error) {
                console.error('错误:', error);
                
                // 隐藏加载状态
                hideLoading(loadingElement);
                
                // 添加错误消息到聊天界面
                addMessage('抱歉，暂时无法连接到服务器，请稍后再试。', 'ai');
            }
        }
        
        // 模拟API响应函数
        function getMockResponse(message) {
            // 简单的关键词匹配，返回相应的响应
            message = message.toLowerCase();
            
            if (message.includes('你好') || message.includes('您好') || message.includes('hi') || message.includes('hello')) {
                return '你好！我是一个AI助手，有什么可以帮助你的吗？';
            } else if (message.includes('名字') || message.includes('叫什么')) {
                return '我是一个AI助手，你可以叫我小助手。';
            } else if (message.includes('天气') || message.includes('气温')) {
                return '抱歉，我无法实时获取天气信息，但你可以通过天气预报网站查询最新天气。';
            } else if (message.includes('时间') || message.includes('几点')) {
                return '当前时间是：' + new Date().toLocaleString('zh-CN');
            } else if (message.includes('帮助') || message.includes('功能')) {
                return '我可以回答你的问题，提供信息，或者和你聊天。你可以尝试问我一些常见问题。';
            } else if (message.includes('再见') || message.includes('拜拜')) {
                return '再见！如果你有任何问题，随时可以回来问我。';
            } else {
                return '我理解你的问题，这是一个模拟响应。在实际应用中，这里会显示来自大模型API的真实回答。';
            }
        }
        
        // 添加消息到聊天界面
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 显示加载状态
        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading-container';
            loadingDiv.innerHTML = '<div class="loading"></div>';
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return loadingDiv;
        }
        
        // 隐藏加载状态
        function hideLoading(loadingElement) {
            if (loadingElement) {
                loadingElement.remove();
            }
        }
        
        // 绑定发送按钮点击事件
        sendBtn.addEventListener('click', sendMessage);
        
        // 绑定输入框回车事件
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
